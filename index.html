<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>李宏毅《机器学习 2025》课程笔记</title>
  <meta name="description" content="李宏毅《机器学习 2025》课程笔记 PDF 在线预览目录，收录 P01-P58。">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #f0f4f7;
      --ink: #16202a;
      --muted: #65727f;
      --line: #d8e0e7;
      --accent: #245b7d;
      --accent-2: #4b6b49;
      --danger: #8a4a32;
      --shadow: 0 8px 24px rgba(32, 44, 56, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC",
        "Microsoft YaHei", sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(246, 247, 249, 0.96);
      backdrop-filter: blur(12px);
    }

    .topbar-inner,
    .page {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
      white-space: nowrap;
    }

    .brand strong {
      font-size: 17px;
      font-weight: 700;
    }

    .brand span {
      color: var(--muted);
      font-size: 13px;
    }

    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a,
    .action,
    .clear-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      font-size: 14px;
      font-weight: 600;
      padding: 6px 11px;
      transition: border-color 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .nav a:hover,
    .action:hover,
    .clear-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .page {
      padding: 28px 0 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 24px;
      padding: 8px 0 24px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 720px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 17px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(88px, 1fr));
      gap: 10px;
      min-width: 300px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 12px;
      margin: 22px 0;
    }

    .search {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      padding: 8px 12px;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(36, 91, 125, 0.14);
    }

    .sections {
      display: grid;
      gap: 18px;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
      padding: 14px 16px;
    }

    .section-header h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .section-header span {
      flex: none;
      color: var(--muted);
      font-size: 13px;
    }

    .lecture-list {
      display: grid;
    }

    .lecture {
      display: grid;
      grid-template-columns: 70px minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      min-height: 62px;
      border-bottom: 1px solid var(--line);
      padding: 12px 16px;
    }

    .lecture:last-child {
      border-bottom: 0;
    }

    .part {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      min-height: 32px;
      border-radius: 6px;
      background: #e6edf2;
      color: #1f4f70;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .title {
      min-width: 0;
    }

    .title strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 16px;
      line-height: 1.35;
    }

    .title small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .action.primary:hover {
      border-color: #17435f;
      background: #17435f;
      color: #fff;
    }

    .action.source:hover {
      border-color: var(--accent-2);
      color: var(--accent-2);
    }

    .empty {
      display: none;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 20px;
      color: var(--muted);
      text-align: center;
    }

    .footer {
      margin-top: 28px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 820px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
        padding: 12px 0;
      }

      .brand {
        white-space: normal;
      }

      .nav {
        justify-content: flex-start;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .stats {
        width: 100%;
        min-width: 0;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .lecture {
        grid-template-columns: 58px minmax(0, 1fr);
      }

      .actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }
    }

    @media (max-width: 520px) {
      .topbar-inner,
      .page {
        width: min(100% - 22px, 1160px);
      }

      .stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .stat {
        padding: 10px;
      }

      .stat strong {
        font-size: 20px;
      }

      .section-header {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .action,
      .clear-button {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="./" aria-label="返回首页">
        <strong>ML 2025 Notes</strong>
        <span>李宏毅机器学习课程笔记</span>
      </a>
      <nav class="nav" aria-label="站点链接">
        <a href="README.md">README</a>
        <a href="index.csv">index.csv</a>
        <a href="https://github.com/xmy3/hung-yi-lee-ml2025-notes">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="hero">
      <div>
        <h1>李宏毅《机器学习 2025》课程笔记</h1>
        <p class="subtitle">P01-P58 的 PDF 在线预览目录，包含 LaTeX 源文件与按主题整理的讲次索引。</p>
      </div>
      <div class="stats" aria-label="仓库统计">
        <div class="stat">
          <strong id="stat-lectures">58</strong>
          <span>讲 notes</span>
        </div>
        <div class="stat">
          <strong>58</strong>
          <span>PDF</span>
        </div>
        <div class="stat">
          <strong>58</strong>
          <span>TeX</span>
        </div>
      </div>
    </section>

    <section class="toolbar" aria-label="筛选">
      <input id="search" class="search" type="search" placeholder="搜索讲次、主题或文件名" autocomplete="off">
      <button id="clear" class="clear-button" type="button">清空</button>
    </section>

    <p id="empty" class="empty">没有匹配的讲次。</p>
    <div id="sections" class="sections" aria-live="polite"></div>

    <footer class="footer">
      笔记文字与排版为个人学习整理，仅供学习交流使用；课程截图与课程内容版权归原课程作者所有。
    </footer>
  </main>

  <script>
    const groups = [
      { title: "一、深度学习与训练基础", from: 1, to: 11 },
      { title: "二、自注意力机制与 Transformer", from: 12, to: 17 },
      { title: "三、生成对抗网络（GAN）", from: 18, to: 21 },
      { title: "四、自监督学习与预训练模型", from: 22, to: 27 },
      { title: "五、自编码器与异常检测", from: 28, to: 35 },
      { title: "六、机器学习的可解释性", from: 36, to: 37 },
      { title: "七、对抗式攻击与防御", from: 38, to: 43 },
      { title: "八、领域自适应与自监督模型", from: 44, to: 45 },
      { title: "九、强化学习", from: 46, to: 50 },
      { title: "十、网络压缩", from: 51, to: 52 },
      { title: "十一、终身学习", from: 53, to: 54 },
      { title: "十二、元学习", from: 55, to: 57 },
      { title: "十三、课程总结", from: 58, to: 58 }
    ];

    const titles = {
      P01: "课程导论",
      P02: "深度学习简介",
      P03: "机器学习任务攻略",
      P04: "局部最小值与鞍点",
      P05: "Batch 与 Momentum",
      P06: "自适应学习率",
      P07: "分类与损失函数",
      P08: "宝可梦分类实战",
      P09: "卷积神经网络（CNN）",
      P10: "验证集与过拟合",
      P11: "鱼与熊掌：深度的意义",
      P12: "自注意力机制（上）",
      P13: "自注意力机制（下）",
      P14: "批次标准化（Batch Normalization）",
      P15: "Transformer（上）",
      P16: "Transformer（下）",
      P17: "自注意力机制的各种变体",
      P18: "GAN（一）：基本概念",
      P19: "GAN（二）：理论与 WGAN",
      P20: "GAN（三）：评估与条件生成",
      P21: "GAN（四）：非成对生成与 CycleGAN",
      P22: "自监督学习简介",
      P23: "BERT 简介",
      P24: "BERT 的奇闻轶事",
      P25: "GPT 的野望",
      P26: "高效参数微调（Efficient Tuning）",
      P27: "语音与影像的自监督学习",
      P28: "自编码器（Auto-encoder）基础",
      P29: "异常检测（一）",
      P30: "异常检测（二）",
      P31: "异常检测（三）",
      P32: "异常检测（四）",
      P33: "异常检测（五）",
      P34: "异常检测（六）：最大似然与高斯密度",
      P35: "异常检测（七）：多特征与重建误差",
      P36: "可解释性（上）：宝可梦与数码宝贝",
      P37: "可解释性（下）：机器心中的猫",
      P38: "NLP 对抗式攻击（一）：文本扰动",
      P39: "来自人类的恶意攻击（上）：基本概念",
      P40: "来自人类的恶意攻击（下）：黑箱攻击与防御",
      P41: "NLP 对抗式攻击（二）：约束、搜索与触发器",
      P42: "NLP 对抗式攻击（三）：生成式攻击与防御",
      P43: "NLP 上的模仿攻击与后门攻击",
      P44: "领域自适应概述",
      P45: "BERT 的三个故事：自监督模型的多功能性",
      P46: "强化学习（一）：RL 也是机器学习三步骤",
      P47: "强化学习（二）：Policy Gradient",
      P48: "强化学习（三）：Actor-Critic",
      P49: "强化学习（四）：Reward Shaping",
      P50: "强化学习（五）：Learning from Demonstration",
      P51: "网络压缩（一）：Network Pruning",
      P52: "网络压缩（二）：多视角压缩方法",
      P53: "终身学习（一）：灾难性遗忘",
      P54: "终身学习（二）：缓解灾难性遗忘",
      P55: "元学习（一）：Learning to Learn",
      P56: "元学习（二）：万物皆可 Meta",
      P57: "元学习（三）：各种非常规用法",
      P58: "课程结语：深度学习的一学期游"
    };

    const repoBase = "https://github.com/xmy3/hung-yi-lee-ml2025-notes/blob/main/";
    const search = document.querySelector("#search");
    const clear = document.querySelector("#clear");
    const sections = document.querySelector("#sections");
    const empty = document.querySelector("#empty");

    let lectures = [];

    function parseCsv(text) {
      const lines = text.replace(/^\uFEFF/, "").trim().split(/\r?\n/);
      const headers = lines.shift().split(",");
      return lines.map((line) => {
        const values = line.split(",");
        return headers.reduce((entry, header, index) => {
          entry[header] = values[index] || "";
          return entry;
        }, {});
      });
    }

    function partNumber(part) {
      return Number(part.replace(/\D/g, ""));
    }

    function normalize(value) {
      return value.toLowerCase().replace(/\s+/g, " ").trim();
    }

    function render(query = "") {
      const needle = normalize(query);
      const filtered = lectures.filter((lecture) => {
        const haystack = normalize([
          lecture.part,
          lecture.slug,
          lecture.title,
          lecture.pdf,
          lecture.tex
        ].join(" "));
        return !needle || haystack.includes(needle);
      });

      sections.innerHTML = "";
      empty.style.display = filtered.length ? "none" : "block";

      for (const group of groups) {
        const groupLectures = filtered.filter((lecture) => {
          const number = partNumber(lecture.part);
          return number >= group.from && number <= group.to;
        });

        if (!groupLectures.length) continue;

        const section = document.createElement("section");
        section.className = "section";
        section.innerHTML = `
          <div class="section-header">
            <h2>${group.title}</h2>
            <span>P${String(group.from).padStart(2, "0")}-P${String(group.to).padStart(2, "0")} · ${groupLectures.length} 讲</span>
          </div>
          <div class="lecture-list"></div>
        `;

        const list = section.querySelector(".lecture-list");
        for (const lecture of groupLectures) {
          const item = document.createElement("article");
          item.className = "lecture";
          item.innerHTML = `
            <div class="part">${lecture.part}</div>
            <div class="title">
              <strong>${lecture.title}</strong>
              <small>${lecture.slug}</small>
            </div>
            <div class="actions">
              <a class="action primary" href="${lecture.pdf}">PDF</a>
              <a class="action source" href="${lecture.tex}">TeX</a>
              <a class="action" href="${repoBase}${lecture.pdf}">GitHub</a>
            </div>
          `;
          list.appendChild(item);
        }

        sections.appendChild(section);
      }
    }

    async function boot() {
      try {
        const response = await fetch("index.csv", { cache: "no-store" });
        if (!response.ok) throw new Error(`index.csv ${response.status}`);
        lectures = parseCsv(await response.text()).map((lecture) => ({
          ...lecture,
          title: titles[lecture.part] || lecture.slug.replaceAll("_", " ")
        }));
        document.querySelector("#stat-lectures").textContent = String(lectures.length);
        render();
      } catch (error) {
        sections.innerHTML = "";
        empty.textContent = "index.csv 加载失败，请稍后刷新。";
        empty.style.display = "block";
        console.error(error);
      }
    }

    search.addEventListener("input", () => render(search.value));
    clear.addEventListener("click", () => {
      search.value = "";
      render();
      search.focus();
    });

    boot();
  </script>
</body>
</html>
